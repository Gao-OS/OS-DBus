name: E2E

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to test (e.g. 0.2.0) — checks out v{version} tag'
        required: false
        type: string
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests${{ inputs.version && format(' (v{0})', inputs.version) || '' }}
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-e2e-${{ hashFiles('**/mix.lock', '**/mix.exs') }}
          restore-keys: ${{ runner.os }}-mix-e2e-

      - name: Install dependencies
        run: mix deps.get

      - name: Install D-Bus and interop tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dbus dbus-user-session libglib2.0-bin libglib2.0-dev gcc pkg-config

      - name: Build C fixture
        run: make -C apps/gao_bus_test/test/fixture

      - name: Run E2E tests
        run: mix test --only e2e
        working-directory: apps/gao_bus_test
