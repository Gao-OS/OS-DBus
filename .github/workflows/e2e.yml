name: E2E

on:
  push:
    branches: [ '*' ]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - name: Install D-Bus tools
        run: sudo apt-get install -y dbus dbus-user-session libglib2.0-bin

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run E2E tests
        run: mix test --only e2e
        working-directory: apps/gao_bus_test
